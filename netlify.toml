# ─────────────────────────────────────────────
#  Netlify Configuration — WNDRbox
# ─────────────────────────────────────────────

[build]
  publish = "."        # root of repo is the site
  command = ""         # no build step needed (plain HTML/CSS/JS)

# Redirect all 404s back to index for SPA-like behaviour
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security & performance headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# Cache static assets aggressively
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
